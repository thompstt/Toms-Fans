name: Tom's Fans
options:
  bundleIdPrefix: com.tomsfans
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Tom's Fans:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - path: Resources/Assets.xcassets
    dependencies:
      - target: com.tomsfans.helper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomsfans.app
        PRODUCT_NAME: "Tom's Fans"
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: App/Info.plist
      properties:
        CFBundleName: "Tom's Fans"
        CFBundleIdentifier: com.tomsfans.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: "Tom's Fans"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: false
        NSMainStoryboardFile: ""
    postBuildScripts:
      - script: |
          # Copy helper binary into app bundle for SMAppService.daemon
          HELPER_SRC="${BUILT_PRODUCTS_DIR}/com.tomsfans.helper"
          HELPER_DST="${BUILT_PRODUCTS_DIR}/${FULL_PRODUCT_NAME}/Contents/Library/LaunchDaemons"
          PLIST_SRC="${SRCROOT}/Helper/launchd.plist"

          mkdir -p "${HELPER_DST}"
          cp -f "${HELPER_SRC}" "${HELPER_DST}/com.tomsfans.helper"
          cp -f "${PLIST_SRC}" "${HELPER_DST}/com.tomsfans.helper.plist"
        name: "Embed Helper Tool"

  com.tomsfans.helper:
    type: tool
    platform: macOS
    sources:
      - path: Helper
        excludes:
          - "**/.DS_Store"
          - launchd.plist
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomsfans.helper
        PRODUCT_NAME: com.tomsfans.helper
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: false
        # The helper is a command-line tool with no Info.plist, so codesign derives
        # its signing identifier from the binary name "com.tomsfans.helper" — and
        # strips ".helper" as if it were a file extension, yielding "com.tomsfans".
        # That mismatched identity fails the SMAppService LaunchDaemon's launch
        # requirement (LWCR), so launchd rejects every spawn with EX_CONFIG (78) and
        # the helper never runs. Pin the identifier explicitly so it matches the
        # daemon Label / registration.
        OTHER_CODE_SIGN_FLAGS: "--identifier com.tomsfans.helper"

  Tom's FansTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
      - path: Shared/Safety
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomsfans.tests
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""

schemes:
  Tom's Fans:
    build:
      targets:
        Tom's Fans: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Tom's FansTests
